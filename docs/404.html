    <script type="text/javascript">
      // SPA Router for GitHub Pages
      // This script handles all routes by serving index.html
      // The React Router will handle the actual routing in the browser
      
      var pathname = window.location.pathname;
      
      // If the path doesn't end with index.html, redirect to index.html
      // This allows GitHub Pages to serve the correct file
      if (!pathname.endsWith('index.html') && !pathname.endsWith('/')) {
        // Add trailing slash for consistency
        window.location.replace(pathname + '/');
      }
    </script>
