    <!-- Dynamic Meta Tags Script -->
    <script>
      const pageMetadata = {
        '/': {
          title: 'HousePlus Group Nigeria Factory | Solar Panels, Home Appliances & 3C Electronics for Africa',
          description: 'HousePlus Group Nigeria Factory is a leading manufacturer and supplier of solar panels, inverters, lithium batteries, home appliances, and 3C electronics. Factory direct pricing, OEM/ODM available. Serving Nigeria, Africa and global markets.',
          keywords: 'HousePlus Group Nigeria Factory, HousePlus Group, solar panels, inverters, lithium batteries, home appliances, 3C electronics, Nigeria manufacturer, Lagos factory, Africa, OEM ODM, solar energy, air fryer, smart watch, power bank',
          canonical: 'https://www.houseplus.com.ng/'
        },
        '/about': {
          title: 'About Us - HousePlus Group Nigeria Factory | Wholesale Manufacturer',
          description: 'Learn about HousePlus Group Nigeria Factory, a leading manufacturer of solar energy products, home appliances, and 3C electronics based in Lagos, Nigeria.',
          keywords: 'HousePlus Group about, company profile, solar manufacturer, home appliances manufacturer, 3C electronics, Nigeria factory',
          canonical: 'https://www.houseplus.com.ng/about'
        }
      };

      function normalizePath(path) {
        if (path === '/') return '/';
        return path.replace(/\/$/, '');
      }

      const currentPath = normalizePath(window.location.pathname);
      const metadata = pageMetadata[currentPath] || pageMetadata['/'];

      document.title = metadata.title;
      
      function updateMetaTag(name, content, isProperty = false) {
        const attr = isProperty ? 'property' : 'name';
        let tag = document.querySelector(`meta[${attr}="${name}"]`);
        if (!tag) {
          tag = document.createElement('meta');
          tag.setAttribute(attr, name);
          document.head.appendChild(tag);
        }
        tag.setAttribute('content', content);
      }
      
      updateMetaTag('title', metadata.title);
      updateMetaTag('description', metadata.description);
      updateMetaTag('keywords', metadata.keywords);
      updateMetaTag('og:title', metadata.title, true);
      updateMetaTag('og:description', metadata.description, true);
      updateMetaTag('og:url', metadata.canonical, true);
      updateMetaTag('twitter:title', metadata.title);
      updateMetaTag('twitter:description', metadata.description);
      
      let canonical = document.querySelector('link[rel="canonical"]');
      if (!canonical) {
        canonical = document.createElement('link');
        canonical.rel = 'canonical';
        document.head.appendChild(canonical);
      }
      canonical.href = metadata.canonical;
    </script>

    <!-- GitHub Pages SPA routing fix -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/\+/g, ' ');
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -10) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
