<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>House Plus Group</title>
    <script>
      // spa-github-pages redirect
      // This is a standard solution for handling client-side routing in GitHub Pages
      // Reference: https://github.com/rafgraph/spa-github-pages
      
      var segmentCount = 0;
      var l = window.location;
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
