<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>House Plus Group</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
      }
      
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f2d5e 0%, #1a3a7a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .loading {
        text-align: center;
        color: white;
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 20px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      
      p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="spinner"></div>
      <h1>Loading...</h1>
      <p>Redirecting you</p>
    </div>
    
    <script>
      // Optimized spa-github-pages redirect
      // Minimal code for fastest execution
      (function() {
        var l = window.location;
        var path = l.pathname.slice(1).split('/').slice(0).join('/');
        
        // Immediate redirect without delay
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + path +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash
        );
      })();
    </script>
  </body>
</html>
