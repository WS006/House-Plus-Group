<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>House Plus Group</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #0f2d5e 0%, #1a3a7a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .loading-container {
        text-align: center;
        color: white;
      }
      
      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto 30px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      h1 {
        font-size: 24px;
        margin-bottom: 10px;
        font-weight: 600;
      }
      
      p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 5px;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
    <script>
      // spa-github-pages redirect
      // Reference: https://github.com/rafgraph/spa-github-pages
      var segmentCount = 0;
      var l = window.location;
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div class="loading-container">
      <div class="spinner"></div>
      <h1>Loading...</h1>
      <p>Please wait while we redirect you</p>
    </div>
  </body>
</html>
